name: Test (and Deploy to PyPI on tag)

on:
  # Only run on pushes to main, or when version tags are pushed
  push:
    branches:
      - "main"
    tags:
      - "v**"
  # Run on all pull-requests
  pull_request:
  schedule:
  # Runs at 6:10am UTC on Monday
    - cron: '10 6 * * 1'
  # Allow workflow dispatch from GitHub
  workflow_dispatch:

concurrency:
  # Cancel this workflow if it is running,
  # and then changes are applied on top of the HEAD of the branch,
  # triggering another run of the workflow
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting:
    runs-on: ubuntu-latest
    name: Check Linting
    steps:
      - uses: neuroinformatics-unit/actions/lint@v2

  manifest:
    name: Check Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: neuroinformatics-unit/actions/check_manifest@v2

  test:
    needs: [linting, manifest]
    name: Run package tests
    timeout-minutes: 120
    runs-on: ${{ matrix.os }}
    env:
      KERAS_BACKEND: torch
      CELLFINDER_TEST_DEVICE: cpu
      # pooch cache dir
      BRAINGLOBE_TEST_DATA_DIR: "~/.pooch_cache"

    strategy:
      matrix:
        # Run all supported Python versions on linux
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        # Include one windows and one macOS (arm based) run
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      # Free up disk space on ubuntu runners
      - name: Free Disk Space
        if: matrix.os == 'ubuntu-latest'
        uses: endersonmenezes/free-disk-space@6c4664f43348c8c7011b53488d5ca65e9fc5cd1a # v3
        with:
          remove_android: true
          remove_dotnet: true
          rm_cmd: 'rmz'
          rmz_version: '3.1.1'

      - uses: actions/checkout@v4
      - name: Cache pooch data
        uses: actions/cache@v4
        with:
          path: "~/.pooch_cache"
          # hash on conftest in case url changes
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pooch_registry.txt') }}
      # Cache the tensorflow model so we don't have to remake it every time
      - name: Cache brainglobe directory
        uses: actions/cache@v4
        with:
          path: | # ensure we don't cache any interrupted atlas download and extraction, if e.g. we cancel the workflow manually
            ~/.brainglobe
            !~/.brainglobe/atlas.tar.gz
          key: brainglobe
      # Setup pyqt libraries
      - name: Setup qtpy libraries
        uses: tlambert03/setup-qt-libs@v1
      # Setup VTK with headless display
      - uses: pyvista/setup-headless-display-action@v3

      # dev,napari replaces tox's "extras = dev\n        napari"
      - name: Run tests
        uses: neuroinformatics-unit/actions/test-uv@main
        with:
          python-version: ${{ matrix.python-version }}
          secret-codecov-token: ${{ secrets.CODECOV_TOKEN }}
          install-extras: 'dev,napari'
          use-xvfb: 'true'

      # On schedule: just overwrite napari and rerun — no full reinstall
      - name: Install napari from main
        if: github.event_name == 'schedule'
        shell: bash
        run: uv pip install git+https://github.com/napari/napari

      - name: Run tests against napari main
        if: github.event_name == 'schedule'
        shell: bash
        run: pytest

      - name: Notify slack on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }} # required
          notify_when: 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFYBOT_WEBHOOK_URL }} # required

  test_numba_disabled:
    needs: [linting, manifest]
    name: Run tests with numba disabled
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      NUMBA_DISABLE_JIT: "1"
      PYTORCH_JIT: "0"
      # pooch cache dir
      BRAINGLOBE_TEST_DATA_DIR: "~/.pooch_cache"

    steps:
      # Free up disk space on ubuntu runners
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@6c4664f43348c8c7011b53488d5ca65e9fc5cd1a # v3
        with:
          remove_android: true
          remove_dotnet: true
          rm_cmd: 'rmz'
          rmz_version: '3.1.1'

      - uses: actions/checkout@v4
      - name: Cache brainglobe directory
        uses: actions/cache@v4
        with:
          path: | # ensure we don't cache any interrupted atlas download and extraction, if e.g. we cancel the workflow manually
            ~/.brainglobe
            !~/.brainglobe/atlas.tar.gz
          key: brainglobe

      - name: Cache pooch data
        uses: actions/cache@v4
        with:
          path: "~/.pooch_cache"
          key: ${{ runner.os }}-3.10-${{ hashFiles('**/pooch_registry.txt') }}

      # Setup pyqt libraries
      - name: Setup qtpy libraries
        uses: tlambert03/setup-qt-libs@v1
      # Setup VTK with headless display
      - uses: pyvista/setup-headless-display-action@v3

      - name: Run tests with numba disabled
        uses: neuroinformatics-unit/actions/test-uv@main
        with:
          python-version: "3.12"
          secret-codecov-token: ${{ secrets.CODECOV_TOKEN }}
          install-extras: 'dev,napari'
          codecov-flags: "numba"
          use-xvfb: 'true'

      - name: Notify slack on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }} # required
          notify_when: 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFYBOT_WEBHOOK_URL }} # required

  # This job can't use the composite action because it checks out a
  # diff repo (brainglobe-workflows)
  test_brainmapper_cli:
    needs: [linting, manifest]
    name: Run brainmapper tests to check for breakages
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      KERAS_BACKEND: torch
      CELLFINDER_TEST_DEVICE: cpu
    steps:
      # Free up disk space on ubuntu runners
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@6c4664f43348c8c7011b53488d5ca65e9fc5cd1a # v3
        with:
          remove_android: true
          remove_dotnet: true
          rm_cmd: 'rmz'
          rmz_version: '3.1.1'

      - name: Cache brainglobe directory
        uses: actions/cache@v4
        with:
          path: | # ensure we don't cache any interrupted atlas download and extraction, if e.g. we cancel the workflow manually
            ~/.brainglobe
            !~/.brainglobe/atlas.tar.gz
          key: brainglobe
      - name: Checkout brainglobe-workflows
        uses: actions/checkout@v4
        with:
          repository: 'brainglobe/brainglobe-workflows'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install cellfinder from this SHA and brainglobe-workflows
        shell: bash
        run: |
          uv pip install "cellfinder @ git+$GITHUB_SERVER_URL/$GITHUB_REPOSITORY@$GITHUB_SHA"
          uv pip install ".[dev]"

      - name: Run brainmapper tests
        shell: bash
        run: pytest --color=yes -v tests/brainmapper

  build_sdist_wheel:
    name: Build source distribution
    needs: [test, test_numba_disabled]
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
    - uses:  neuroinformatics-unit/actions/build_sdist_wheels@v2

  upload_all:
    name: Publish build distributions
    needs: [build_sdist_wheel]
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: artifact
        path: dist
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.TWINE_API_KEY }}
